<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">   
</head>
<body>
<nav class="navbar">
  <div class="nav-gol">
    <a href="#" class="nav-logo">q<span>PC</span></a>
    
    <ul class="nav-links">
      <li><a href="#">Головна</a></li>
      <li><a href="#">Зібрати</a></li>
      <li><a href="#">Послуги</a></li>
      <li><a href="#">Про нас</a></li>
    </ul>

    <div class="nav-actions">
      <a href="#" class="btn-contact">Замовити</a>
    </div>
  </div>
</nav>
<div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
  <img src="/image/carousel-first-item.jpg" class="d-block w-100" alt="Перший слайд">

  <div class="carousel-caption d-none d-md-block">
    <h5>Найкраща збірка</h5>
  </div>
</div>
    <div class="carousel-item">
      <img src="/image/carousel-second-item.jpg" class="d-block w-100" alt="другий слайд">
      <div class="carousel-caption d-none d-md-block">
        <h5>Вигідні ціни</h5>
      </div>
    </div>
    <div class="carousel-item">
      <img src="/image/carousel-third-item.jpg" class="d-block w-100" alt="третій слайд">
      <div class="carousel-caption d-none d-md-block">
        <h5>Якісне обслуговування</h5>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
<!--<button class="Drop-page" type="button">Детальніше</button> -->
<div class="PC-container">
  <img src="/image/PC1.png" class="d-block" height="350px" width="350px">
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
