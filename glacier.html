<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-custom">
  <div class="container">
    <a class="navbar-brand" href="#">q<span>PC</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/index.html">Головна</a>

        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="Glacier-project container">
    <h1 class="text-center project-title">Glacier</h1>
    
    <div class="glacier-options">
      <button type="button" class="btn btn-tab active">Детальніше</button>
      <button type="button" class="btn btn-tab">Характеристики</button>
      <button type="button" class="btn btn-tab">Відгуки</button>
      <button type="button" class="btn btn-buy">Придбати</button>
    </div>

    <div class="project-content-layout">
        <div class="project-card-custom">
            <div class="project-gallery-vertical">
                <div class="glacier-img-min">
                    <img src="./image/projects/Glacier/glacier-front.png" class="thumb active" alt="Front">
                    <img src="./image/projects/Glacier/glacier-back.png" class="thumb" alt="Back">
                    <img src="./image/projects/Glacier/glacier-inside.png" class="thumb" alt="Inside">
                </div>
                <div class="main-image-wrapper">
                    <img id="main-display" src="./image/projects/Glacier/glacier-front.png" alt="Glacier Main">
                </div>
            </div>
        </div>

        <div class="glacier-detail">
            <div class="glacier-price">
                <h3>Ціна: 85 900 ₴</h3>
            </div>
            <button class="btn btn-add-to-cart">Додати в кошик</button>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.btn-details').forEach(button => {
        button.addEventListener('click', function() {
            const card = this.closest('.project-card');
            const details = card.querySelector('.project-details');
            details.classList.toggle('show');
            this.textContent = details.classList.contains('show') ? 'ЗГОРНУТИ' : 'ДЕТАЛЬНІШЕ';
        });
    });
</script>
<script>
    const mainImg = document.getElementById('main-display');
    const thumbnails = document.querySelectorAll('.thumb');

    thumbnails.forEach(thumb => {
        thumb.addEventListener('click', function() {
            mainImg.src = this.src;
            thumbnails.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
<script src="./js/backtotop.js"></script>
</body>
</html>
